name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type Check
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: API Docs Check
        run: bun run docs:api:check

      - name: Run Tests
        run: bun run test

      - name: Size Limit
        run: bun run size

      - name: Pack Dry Run
        run: bun run pack:dry-run
